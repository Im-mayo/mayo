<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Profile</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Times New Roman;
    }

    body{
      background:#3b2314;
      color:#f5efe3;
      padding:40px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .title{
      font-size:90px;
      font-weight:900;
      letter-spacing:5px;
      margin-bottom:20px;
    }

    .card{
      background:#e9dfcf;
      border-radius:30px;
      padding:25px;
      display:flex;
      gap:25px;
      align-items:center;
      color:#2e1a10;
    }

    .left{
      width:40%;
    }

    .profile{
      background:#efe6d8;
      border:2px solid #6d5648;
      border-radius:20px;
      padding:15px;
      margin-bottom:20px;
    }

    .profile h2{
      font-size:28px;
      margin-bottom:10px;
    }

    .profile p{
      font-size:18px;
      margin:6px 0;
    }

    .button{
      background:#3b2314;
      color:white;
      padding:15px;
      text-align:center;
      border-radius:15px;
      font-size:20px;
      margin-top:15px;
      cursor:pointer;
    }

    .button:hover{
      background:#5a3823;
    }

    .right{
      width:60%;
    }

    .right img{
      width:100%;
      border-radius:25px;
      object-fit:cover;
    }

    .footer{
      margin-top:25px;
      background:#efe6d8;
      color:#2e1a10;
      width:350px;
      padding:18px;
      border-radius:20px;
      font-size:28px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      IRISH MAY ANDO OBSIOMA
    </div>

    <div class="card">

      <div class="left">

        <div class="profile">
          <h2>Iris May</h2>

          <p><b>Age:</b> 21</p>
          <p><b>Course:</b> Bachelor of Science in Information Technology</p>
          <p><b>Address:</b> Zone 2, Poblacion, Malitbog Bukidnon</p>
          <p><b>Email:</b> irishmayobsioma2222@gmail.com</p>
          <p><b>Contact No.:</b> 09753947406</p>
        </div>

        <div class="button">
          About Me!
        </div>

      </div>

      <div class="right">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1000&auto=format&fit=crop" alt="Profile Picture">
      </div>

    </div>

    <div class="footer">
      Comfortable with solitude.
    </div>

  </div>

</body>
</html>
