<!DOCTYPE html>
<html>
<head>
  <title>Personal Information</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 40px;
    }

    .card {
      background: white;
      width: 350px;
      margin: auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    span {
      font-weight: bold;
      color: #000;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Personal Information</h1>

    <p><span>Name:</span> Iris May</p>
    <p><span>Age:</span> 21</p>
    <p><span>Address:</span> Tulunan, Philippines</p>
    <p><span>Email:</span> iris@example.com</p>
    <p><span>Course:</span> BS Information Technology</p>
    <p><span>Hobbies:</span> Designing, Coding, Reading</p>
  </div>

</body>
</html>
